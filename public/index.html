<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UNO Online</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ① Top Screen -->
<section id="screen-top" class="screen active">
  <!-- ログイン済みユーザーチップ -->
  <div id="user-chip" class="user-chip hidden">
    <div class="user-chip-avatar" id="chip-avatar">🎮</div>
    <span id="chip-name" class="user-chip-name"></span>
    <button id="btn-settings" class="user-chip-settings" aria-label="設定">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
  <div class="splash-logo">
    <h1 class="uno-logo">UNO</h1>
    <p class="splash-tagline">オンライン対戦</p>
  </div>
  <nav class="splash-nav">
    <a id="btn-guest-link" class="splash-link primary">部屋を作る</a>
    <a id="btn-join-link" class="splash-link">部屋に参加</a>
    <a id="btn-login-link" class="splash-link splash-link-sub">ログイン</a>
  </nav>
</section>

<!-- Guest entry sheet (slides up on "ログインせずに開始") -->
<div id="guest-sheet" class="guest-sheet hidden">
  <div class="guest-sheet-backdrop"></div>
  <div class="guest-sheet-inner">
    <button class="guest-sheet-close" id="btn-sheet-close">✕</button>
    <h2 class="guest-sheet-title">ゲストとして始める</h2>
    <div class="top-form">
      <div class="form-group">
        <label>ニックネーム</label>
        <input id="input-nickname" type="text" maxlength="16" placeholder="名前を入力..." autocomplete="off">
      </div>
      <button id="btn-create" class="btn btn-primary btn-large">部屋を作る</button>
      <div class="divider"><span>または</span></div>
      <div class="form-group">
        <label>ルームコード</label>
        <input id="input-room-code" type="text" maxlength="4" placeholder="4桁のコード" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
      </div>
      <button id="btn-join" class="btn btn-secondary btn-large">参加する</button>
    </div>
    <div id="top-error" class="error-msg hidden"></div>
  </div>
</div>

<!-- ② Login Screen -->
<section id="screen-login" class="screen">
  <div class="login-header">
    <button id="btn-login-back" class="login-back-btn" aria-label="戻る">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 5L7.5 10L12.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="login-header-logo">UNO</span>
  </div>

  <div class="login-body">
    <h1 class="login-title">アカウント</h1>

    <div class="login-tabs" role="tablist">
      <button class="login-tab active" data-tab="login" role="tab">ログイン</button>
      <button class="login-tab" data-tab="register" role="tab">新規登録</button>
    </div>

    <!-- Login form -->
    <form id="form-login" class="auth-form" autocomplete="on">
      <div class="form-group">
        <label for="login-username">ユーザー名</label>
        <input id="login-username" type="text" placeholder="ユーザー名" autocomplete="username" maxlength="16">
      </div>
      <div class="form-group">
        <label for="login-password">パスワード</label>
        <div class="input-password-wrap">
          <input id="login-password" type="password" placeholder="パスワード" autocomplete="current-password">
          <button type="button" class="btn-toggle-pw" data-target="login-password" aria-label="表示切替">👁</button>
        </div>
      </div>
      <div id="login-error" class="auth-error hidden"></div>
      <button type="submit" class="btn auth-submit-btn">ログイン</button>
    </form>

    <!-- Register form -->
    <form id="form-register" class="auth-form hidden" autocomplete="on">
      <div class="form-group">
        <label for="reg-username">ユーザー名</label>
        <input id="reg-username" type="text" maxlength="16" placeholder="2〜16文字（ゲーム内で表示）" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="reg-password">パスワード</label>
        <div class="input-password-wrap">
          <input id="reg-password" type="password" placeholder="4文字以上" autocomplete="new-password">
          <button type="button" class="btn-toggle-pw" data-target="reg-password" aria-label="表示切替">👁</button>
        </div>
      </div>
      <div id="register-error" class="auth-error hidden"></div>
      <button type="submit" class="btn auth-submit-btn">アカウント作成</button>
    </form>
  </div>
</section>

<!-- ② Lobby Screen -->
<section id="screen-lobby" class="screen">
  <div class="login-header">
    <button id="btn-lobby-back" class="login-back-btn" aria-label="戻る">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 5L7.5 10L12.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="login-header-logo">UNO</span>
  </div>
  <div class="login-body">
    <!-- ログイン済みユーザーカード -->
    <div id="lobby-user-card" class="lobby-user-card hidden">
      <div id="lobby-avatar-display" class="lobby-avatar-display">🎮</div>
      <div>
        <div id="lobby-username-text" class="lobby-username-text"></div>
        <div class="lobby-logged-label">ログイン済み</div>
      </div>
    </div>
    <!-- ゲスト用ニックネーム入力 -->
    <div id="lobby-nickname-group" class="form-group">
      <label for="lobby-nickname-input">ニックネーム</label>
      <input id="lobby-nickname-input" type="text" maxlength="16" placeholder="名前を入力..." autocomplete="off">
    </div>
    <div id="lobby-error" class="auth-error hidden"></div>
    <button id="btn-lobby-create" class="btn auth-submit-btn">部屋を作る</button>
    <div class="divider"><span>または</span></div>
    <button id="btn-goto-join" class="btn btn-outline btn-large">部屋に参加</button>
  </div>
</section>

<!-- ② Join Screen -->
<section id="screen-join" class="screen">
  <div class="login-header">
    <button id="btn-join-back" class="login-back-btn" aria-label="戻る">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 5L7.5 10L12.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="login-header-logo">UNO</span>
  </div>
  <div class="login-body">
    <h1 class="login-title">部屋に参加</h1>
    <div class="form-group">
      <label for="join-room-code-input">ルームコード</label>
      <input id="join-room-code-input" type="text" maxlength="4" placeholder="4桁のコード" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
    </div>
    <div id="join-error" class="auth-error hidden"></div>
    <button id="btn-join-submit" class="btn auth-submit-btn">参加する</button>
  </div>
</section>

<!-- ② Rules Screen -->
<section id="screen-rules" class="screen">
  <div class="login-header">
    <button id="btn-rules-back" class="login-back-btn" aria-label="戻る">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 5L7.5 10L12.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="login-header-logo">UNO</span>
  </div>
  <div class="login-body">
    <h1 class="login-title">ルール設定</h1>
    <div class="rule-group">
      <div class="rule-label">初期手札枚数</div>
      <div class="rule-options">
        <button class="rule-opt active" data-rule="handSize" data-value="7">7枚（標準）</button>
        <button class="rule-opt" data-rule="handSize" data-value="5">5枚</button>
      </div>
    </div>
    <div class="rule-group">
      <div class="rule-label">ターンタイマー</div>
      <div class="rule-options">
        <button class="rule-opt active" data-rule="timerSeconds" data-value="15">15秒</button>
        <button class="rule-opt" data-rule="timerSeconds" data-value="30">30秒</button>
        <button class="rule-opt" data-rule="timerSeconds" data-value="0">なし</button>
      </div>
    </div>
    <div class="rule-group">
      <div class="rule-label">ドロースタック</div>
      <div class="rule-options">
        <button class="rule-opt active" data-rule="drawStack" data-value="false">なし</button>
        <button class="rule-opt" data-rule="drawStack" data-value="true">あり</button>
      </div>
    </div>
    <div class="rule-group">
      <div class="rule-label">勝利点数</div>
      <div class="rule-options">
        <button class="rule-opt active" data-rule="scoreLimit" data-value="500">500点</button>
        <button class="rule-opt" data-rule="scoreLimit" data-value="300">300点</button>
      </div>
    </div>
    <button id="btn-rules-create" class="btn auth-submit-btn">部屋を作る</button>
  </div>
</section>

<!-- ③ Waiting Room -->
<section id="screen-waiting" class="screen">
  <div class="waiting-header">
    <button id="btn-leave-waiting" class="btn-icon" title="退室">←</button>
    <h2>待機室</h2>
  </div>
  <div class="room-code-display">
    <span class="room-code-label">ルームコード</span>
    <span id="display-room-code" class="room-code-value">----</span>
  </div>
  <button id="btn-copy-url" class="btn btn-outline btn-small">🔗 URLをコピー</button>
  <div id="waiting-players" class="waiting-players"></div>
  <div class="waiting-footer">
    <p class="waiting-hint">2〜4人でプレイできます</p>
    <div id="bot-selector" class="bot-selector hidden">
      <label class="bot-selector-label">BOTを追加</label>
      <div class="bot-count-btns">
        <button class="bot-count-btn active" data-count="0">0</button>
        <button class="bot-count-btn" data-count="1">1</button>
        <button class="bot-count-btn" data-count="2">2</button>
        <button class="bot-count-btn" data-count="3">3</button>
      </div>
    </div>
    <button id="btn-start" class="btn btn-primary btn-large hidden">ゲームを開始する</button>
    <p id="waiting-for-host" class="hint-text">ホストがゲームを開始するのを待っています...</p>
  </div>
</section>

<!-- ③ Game Main Screen -->
<section id="screen-game" class="screen">
  <!-- Opponents area (top) -->
  <div id="opponents-area" class="opponents-area"></div>

  <!-- Game center -->
  <div class="game-center">
    <div class="direction-badge" id="direction-badge">↻</div>
    <div class="game-field">
      <div class="deck-area" id="btn-draw-card" title="山札から引く">
        <div class="card card--back" id="deck-card">
          <div class="card-back-design"></div>
        </div>
        <span id="deck-count" class="card-count-badge">0</span>
      </div>
      <div class="discard-area">
        <div id="top-card" class="card"></div>
        <div id="color-indicator" class="color-indicator"></div>
      </div>
    </div>
    <div class="timer-bar-wrapper">
      <div id="timer-bar" class="timer-bar"></div>
      <span id="timer-text" class="timer-text">15</span>
    </div>
    <div id="current-turn-label" class="turn-label"></div>
    <div id="draw-stack-badge" class="draw-stack-badge hidden"></div>
  </div>

  <!-- My hand (bottom) -->
  <div class="my-area">
    <div id="my-hand" class="my-hand"></div>
    <div class="action-row">
      <button id="btn-pass" class="btn btn-outline hidden">パス</button>
      <button id="btn-emote" class="btn btn-icon-round">😊</button>
    </div>
  </div>

  <!-- UNO Button -->
  <button id="btn-uno" class="uno-btn hidden">UNO!</button>
  <!-- Challenge UNO (shown when another player has 1 card and hasn't declared) -->
  <button id="btn-challenge" class="challenge-btn hidden"></button>

  <!-- Color picker overlay -->
  <div id="color-picker" class="overlay hidden">
    <div class="overlay-content">
      <h3>色を選んでください</h3>
      <div class="color-grid">
        <button class="color-btn" data-color="red" style="background:#e53e3e">赤</button>
        <button class="color-btn" data-color="blue" style="background:#3182ce">青</button>
        <button class="color-btn" data-color="green" style="background:#38a169">緑</button>
        <button class="color-btn" data-color="yellow" style="background:#d69e2e">黄</button>
      </div>
    </div>
  </div>

  <!-- Waiting for color overlay (shown to non-chooser) -->
  <div id="waiting-color-overlay" class="overlay-light hidden">
    <p id="waiting-color-text"></p>
  </div>

  <!-- Emote panel -->
  <div id="emote-panel" class="emote-panel hidden">
    <div class="emote-grid">
      <button class="emote-btn" data-emote="laugh">😂<span>LOL</span></button>
      <button class="emote-btn" data-emote="ugh">😤<span>Ugh!</span></button>
      <button class="emote-btn" data-emote="nice">🎉<span>Nice!</span></button>
      <button class="emote-btn" data-emote="shocked">😱<span>Whoa!</span></button>
      <button class="emote-btn" data-emote="thinking">🤔<span>Hmm...</span></button>
      <button class="emote-btn" data-emote="gg">👏<span>GG</span></button>
    </div>
  </div>

  <!-- Floating emote display -->
  <div id="emote-float" class="emote-float hidden"></div>

  <!-- Notification toast -->
  <div id="game-toast" class="game-toast hidden"></div>
</section>

<!-- ④ Round Result -->
<section id="screen-round-result" class="screen">
  <div class="result-content">
    <div class="result-trophy">🏆</div>
    <h2 id="round-winner-name" class="result-winner"></h2>
    <p class="result-subtitle">ラウンド勝利！</p>
    <div id="round-scores-table" class="scores-table"></div>
    <div id="round-hands-table" class="hands-table"></div>
    <div id="next-round-countdown" class="countdown-text"></div>
  </div>
</section>

<!-- ⑥ Final Result -->
<section id="screen-game-end" class="screen">
  <div class="result-content">
    <div class="result-trophy">🥇</div>
    <h2 id="game-winner-name" class="result-winner"></h2>
    <p class="result-subtitle">ゲーム優勝！</p>
    <div id="final-scores-table" class="scores-table"></div>
    <button id="btn-back-to-lobby" class="btn btn-primary btn-large">待機室に戻る</button>
  </div>
</section>

<!-- ⑦ Settings Screen -->
<section id="screen-settings" class="screen settings-screen">
  <div class="settings-header">
    <button id="btn-settings-back" class="settings-back-btn" aria-label="戻る">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 5L7.5 10L12.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="settings-header-title">設定</span>
  </div>

  <!-- タブ -->
  <div class="settings-tabs">
    <button class="settings-tab active" data-tab="avatar">アイコン</button>
    <button class="settings-tab" data-tab="username">ユーザー名</button>
    <button class="settings-tab" data-tab="password">パスワード</button>
    <button class="settings-tab" data-tab="account">アカウント</button>
  </div>

  <div class="settings-body">
    <!-- タブ: アイコン -->
    <div class="settings-tab-panel active" data-panel="avatar">
      <div class="avatar-grid" id="avatar-grid">
        <button class="avatar-option" data-avatar="🎮">🎮</button>
        <button class="avatar-option" data-avatar="🎯">🎯</button>
        <button class="avatar-option" data-avatar="🃏">🃏</button>
        <button class="avatar-option" data-avatar="🎲">🎲</button>
        <button class="avatar-option" data-avatar="⭐">⭐</button>
        <button class="avatar-option" data-avatar="🔥">🔥</button>
        <button class="avatar-option" data-avatar="💎">💎</button>
        <button class="avatar-option" data-avatar="🌟">🌟</button>
        <button class="avatar-option" data-avatar="👑">👑</button>
        <button class="avatar-option" data-avatar="🐉">🐉</button>
        <button class="avatar-option" data-avatar="🦊">🦊</button>
        <button class="avatar-option" data-avatar="🐺">🐺</button>
      </div>
      <p id="avatar-msg" class="settings-msg hidden"></p>
    </div>

    <!-- タブ: ユーザー名 -->
    <div class="settings-tab-panel" data-panel="username">
      <form id="form-change-username" class="settings-form">
        <div class="form-group">
          <label for="new-username">新しいユーザー名</label>
          <input id="new-username" type="text" maxlength="16" placeholder="2〜16文字" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="confirm-pw-username">パスワード（確認）</label>
          <input id="confirm-pw-username" type="password" placeholder="現在のパスワード" autocomplete="current-password">
        </div>
        <p id="username-change-msg" class="settings-msg hidden"></p>
        <button type="submit" class="btn auth-submit-btn">変更する</button>
      </form>
    </div>

    <!-- タブ: パスワード -->
    <div class="settings-tab-panel" data-panel="password">
      <form id="form-change-password" class="settings-form">
        <div class="form-group">
          <label for="current-pw">現在のパスワード</label>
          <input id="current-pw" type="password" placeholder="現在のパスワード" autocomplete="current-password">
        </div>
        <div class="form-group">
          <label for="new-pw">新しいパスワード</label>
          <input id="new-pw" type="password" placeholder="4文字以上" autocomplete="new-password">
        </div>
        <p id="password-change-msg" class="settings-msg hidden"></p>
        <button type="submit" class="btn auth-submit-btn">変更する</button>
      </form>
    </div>

    <!-- タブ: アカウント -->
    <div class="settings-tab-panel" data-panel="account">
      <button id="btn-logout" class="btn btn-outline settings-btn">ログアウト</button>
      <div class="settings-divider"></div>
      <form id="form-delete-account" class="settings-form">
        <p class="settings-danger-label">アカウントを削除すると元に戻せません</p>
        <div class="form-group">
          <label for="delete-pw">パスワード</label>
          <input id="delete-pw" type="password" placeholder="削除するにはパスワードを入力" autocomplete="current-password">
        </div>
        <p id="delete-msg" class="settings-msg hidden"></p>
        <button type="submit" class="btn btn-danger settings-btn" id="btn-delete-account">アカウントを削除する</button>
      </form>
    </div>
  </div>
</section>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
